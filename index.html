<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#080b10">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https://raw.githubusercontent.com; connect-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="极速训练">
  <title>Body.OS 极速训练</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="backButton" class="icon-button hidden" type="button" aria-label="返回上一级">‹</button>
      <div><p class="eyebrow">BODY.OS · QUICK CAPTURE</p><h1 id="screenTitle" tabindex="-1">训练中</h1></div>
      <span id="networkStatus" class="status-pill">本机已保存</span>
      <button id="languageToggle" class="language-toggle" type="button" aria-label="切换中文与英文">中 / EN</button>
    </header>
    <main id="app" aria-live="polite"></main>
    <nav id="bottomBar" class="bottom-bar" aria-label="主要操作"></nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <section id="copyFallback" class="copy-fallback hidden" role="dialog" aria-modal="true" aria-labelledby="copyFallbackTitle">
    <div class="copy-fallback-card">
      <h2 id="copyFallbackTitle">复制 Body.OS JSON</h2>
      <p>浏览器拦截了自动复制。内容已选中：长按后选择“复制”，或再点一次复制按钮。</p>
      <textarea id="copyFallbackText" readonly aria-label="可手动复制的 Body.OS JSON"></textarea>
      <div><button id="copyFallbackClose" type="button">关闭</button><button id="copyFallbackRetry" type="button">再次复制</button></div>
    </div>
  </section>
  <script type="module" src="./app.js"></script>
</body>
</html>
